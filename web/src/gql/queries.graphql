query GetLeaderboard($limit: Int, $sortBy: LeaderboardSort) {
  leaderboard(limit: $limit, sortBy: $sortBy) {
    nickname
    totalScore
    matchesWon
    winRate
  }
}

query GetPlayerStats($nickname: String!) {
  player(nickname: $nickname) {
    nickname
    matchesPlayed
    matchesWon
    winRate
    totalScore
    bestScore
    recentMatches(limit: 5) {
      id
      endedAt
      winnerNick
      playerA {
        nickname
        score
      }
      playerB {
        nickname
        score
      }
    }
  }
}
