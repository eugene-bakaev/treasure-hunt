services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: treasure
      POSTGRES_PASSWORD: treasure
      POSTGRES_DB: treasure
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U treasure']
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 5s
      timeout: 10s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      PORT: '3000'
      POSTGRES_URL: postgres://treasure:treasure@postgres:5432/treasure
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 5s
      timeout: 5s
      retries: 10

  lobby:
    build:
      context: .
      dockerfile: services/lobby/Dockerfile
    environment:
      PORT: '3001'
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - '3001:3001'
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 5s
      timeout: 5s
      retries: 10

  game:
    build:
      context: .
      dockerfile: services/game/Dockerfile
    environment:
      PORT: '3002'
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - '3002:3002'
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 5s
      timeout: 5s
      retries: 10

  stats:
    build:
      context: .
      dockerfile: services/stats/Dockerfile
    environment:
      PORT: '3003'
      POSTGRES_URL: postgres://treasure:treasure@postgres:5432/treasure
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - '3003:3003'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3003/health']
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - '5173:5173'
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  pgdata:
